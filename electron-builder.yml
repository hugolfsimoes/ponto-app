appId: com.pontoapp.app
productName: PontoApp
copyright: Copyright © 2026

directories:
  buildResources: resources

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron/*'
  - '!backend/*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'

asarUnpack:
  - resources/**

win:
  executableName: PontoApp
  # Linux → win32: evita signApp/rcedit via Wine (ver electron.build/multi-platform-build)
  signAndEditExecutable: false
  # Só portable por defeito: NSIS no Linux exige Wine. Instalador: `pnpm run build:win:installer` no Windows.
  target:
    - portable

portable:
  artifactName: ${name}-${version}-portable.${ext}

nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always

linux:
  target:
    - AppImage
    - deb
  maintainer: electronjs.org
  category: Utility

appImage:
  artifactName: ${name}-${version}.${ext}

npmRebuild: false

publish:
  provider: generic
  url: https://example.com/auto-updates
